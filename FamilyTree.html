<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2A4A; --ink-soft:#33456e; --paper:#F7F5EF; --paper-raised:#FFFFFF;
    --rule:#DDD7C6; --gold:#B98A1E; --gold-soft:#F3E6C6;
    --green:#3E6B4F; --green-soft:#E4EEE6; --red:#8C3B2E; --red-soft:#F3E3DF;
    --rose:#A85C6B; --rose-soft:#F2E3E6;
    --text:#241F16; --text-mute:#726C5B;
    --shadow:0 10px 28px rgba(27,42,74,0.10);
  }
  *{box-sizing:border-box;}
  body{margin:0;color:var(--text);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;
    background: radial-gradient(1200px 500px at 15% -10%, rgba(185,138,30,0.06), transparent 60%), var(--paper); min-height:100vh;}
  .wrap{max-width:1260px;margin:0 auto;padding:30px 20px 90px;}

  .masthead{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;padding-bottom:18px;margin-bottom:8px;border-bottom:3px solid var(--ink);}
  .masthead-title{font-family:'Source Serif 4',serif;font-weight:700;font-size:clamp(24px,3.6vw,34px);color:var(--ink);margin:0;}
  .masthead-sub{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute);margin-top:5px;}
  .masthead-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-mute);text-align:right;}
  .gold-rule{height:2px;background:linear-gradient(90deg, var(--gold), transparent 70%);margin-bottom:24px;}

  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .search{flex:1;min-width:200px;padding:12px 15px;font-size:14px;border:1.5px solid var(--rule);background:var(--paper-raised);border-radius:6px;color:var(--text);}
  .search:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(27,42,74,0.08);}
  .btn{padding:11px 15px;font-size:12.5px;font-family:'IBM Plex Mono',monospace;background:var(--paper-raised);border:1.5px solid var(--rule);border-radius:6px;cursor:pointer;color:var(--ink-soft);white-space:nowrap;transition:all .15s ease;}
  .btn:hover{border-color:var(--ink);color:var(--ink);box-shadow:var(--shadow);transform:translateY(-1px);}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}

  .branch-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .chip{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--rule);background:var(--paper-raised);color:var(--text-mute);transition:all .15s ease;}
  .chip:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
  .chip.active{border-color:var(--gold);color:var(--ink);font-weight:600;background:var(--gold-soft);}
  .chip .count{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:.7;}

  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:20px;font-size:11.5px;color:var(--text-mute);align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;}

  .tree{overflow-x:auto;padding:6px 4px 20px;}
  ul.tree-root, .tree ul{list-style:none;margin:0;padding-left:30px;position:relative;}
  .tree ul{padding-top:10px;}
  .tree > ul.tree-root{padding-left:0;}
  .tree li{position:relative;margin-bottom:10px;}
  .tree ul li{padding-left:28px;}
  .tree ul li::before{content:"";position:absolute;top:0;left:0;bottom:18px;width:1.5px;background:var(--rule);}
  .tree ul li:last-child::before{bottom:auto;height:22px;}
  .tree ul li::after{content:"";position:absolute;top:22px;left:0;width:20px;height:0;border-top:1.5px solid var(--rule);}

  .couple{display:inline-flex;align-items:stretch;border-radius:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);cursor:pointer;transition:box-shadow .15s ease, transform .12s ease;}
  .couple:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
  .person{background:var(--paper-raised);border:1.5px solid var(--rule);padding:10px 15px;display:flex;align-items:center;gap:9px;min-width:150px;}
  .person.male{border-left:4px solid var(--ink);}
  .person.female{border-left:4px solid var(--rose);}
  .person.deceased{opacity:.6;}
  .person + .person{border-left-width:1.5px;}
  .p-info .p-name{font-family:'Source Serif 4',serif;font-weight:600;font-size:14.5px;color:var(--ink);line-height:1.2;}
  .p-info .p-meta{font-size:10.5px;color:var(--text-mute);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
  .cross{font-size:11px;color:var(--gold);align-self:center;}
  .toggle{font-size:11px;color:var(--text-mute);width:14px;text-align:center;flex-shrink:0;transition:transform .15s ease;display:inline-block;cursor:pointer;}
  .leaf-dot{width:5px;height:5px;border-radius:50%;background:var(--rule);flex-shrink:0;}
  .collapsed > ul{display:none;}
  .node-row{display:inline-flex;align-items:center;gap:8px;}
  .gen-badge{font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#fff;background:var(--gold);padding:1px 6px;border-radius:10px;position:absolute;top:-8px;left:10px;letter-spacing:.04em;}
  .couple-wrap{position:relative;}

  .empty{text-align:center;padding:60px 20px;color:var(--text-mute);font-family:'IBM Plex Mono',monospace;font-size:13px;}

  .overlay{position:fixed;inset:0;background:rgba(27,42,74,0.4);display:none;z-index:40;}
  .overlay.show{display:block;}
  .panel{position:fixed;top:0;right:0;height:100%;width:min(440px,92vw);background:var(--paper-raised);z-index:41;box-shadow:-10px 0 30px rgba(0,0,0,0.18);transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;}
  .panel.show{transform:translateX(0);}
  .panel-head{padding:24px 26px 18px;border-bottom:1.5px dashed var(--rule);position:relative;}
  .panel-close{position:absolute;top:20px;right:22px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-mute);}
  .panel-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);}
  .panel-title{font-family:'Source Serif 4',serif;font-weight:700;font-size:23px;color:var(--ink);margin:6px 0 2px;}
  .panel-sub{font-size:13px;color:var(--text-mute);}
  .panel-body{padding:20px 26px 30px;}
  .field{padding:13px 0;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:130px 1fr;gap:14px;}
  .field:last-child{border-bottom:none;}
  .field-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);}
  .field-value{font-size:14px;line-height:1.55;color:var(--text);}
  .field-value a{color:var(--ink-soft);cursor:pointer;text-decoration:underline;text-decoration-color:var(--rule);}
  .field-value a:hover{color:var(--gold);}
  .stamp{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid currentColor;display:inline-block;}
  .stamp.alive{color:var(--green);background:var(--green-soft);}
  .stamp.deceased{color:var(--red);background:var(--red-soft);}
  .sub-head{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-mute);margin:20px 0 8px;}

  @media (max-width:640px){ .field{grid-template-columns:1fr;gap:3px;} .person{min-width:120px;padding:8px 11px;} }

  footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--rule);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-mute);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div>
      <h1 class="masthead-title">Family Tree</h1>
      <div class="masthead-sub">Generations · Marriages · Important dates</div>
    </div>
    <div class="masthead-meta" id="meta"></div>
  </div>
  <div class="gold-rule"></div>

  <div class="toolbar">
    <input type="text" class="search" id="search" placeholder="Search by name…">
    <button class="btn" id="expandAll">Expand all</button>
    <button class="btn" id="collapseAll">Collapse all</button>
  </div>

  <div class="branch-chips" id="branchChips"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--ink)"></span> Male</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--rose)"></span> Female</div>
    <div class="legend-item"><span class="cross">✕</span> Married couple</div>
    <div class="legend-item">Click any card for full details →</div>
  </div>

  <div id="content"></div>

  <footer>
    <span>Data sourced from family.json</span>
    <span id="foot-count"></span>
  </footer>
</div>

<div class="overlay" id="overlay"></div>
<div class="panel" id="panel"></div>

<script>
let MEM = [], byId = {}, byFamily = {};
let activeBranch = null;

function esc(s){
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  return (s||"").toString().replace(/[&<>"']/g, c => map[c]);
}

async function load(){
  try{
    const res = await fetch('family.json', {cache:'no-store'});
    const json = await res.json();
    MEM = json.members || [];
    byId = {}; byFamily = {};
    MEM.forEach(m => {
      byId[m.memberId] = m;
      if(!byFamily[m.familyId]) byFamily[m.familyId] = [];
      byFamily[m.familyId].push(m);
    });
    const bloodCount = MEM.filter(m=>m.relationType==='Blood').length;
    document.getElementById('meta').textContent = `${bloodCount} blood members · ${MEM.length} total` + (json.generatedAt?` · Updated ${json.generatedAt}`:'');
    document.getElementById('foot-count').textContent = `${MEM.length} records loaded`;
    buildBranchChips();
    renderTree();
  }catch(e){
    document.getElementById('content').innerHTML = `<div class="empty">Could not load family.json.<br>Make sure it sits alongside FamilyTree.html.</div>`;
    console.error(e);
  }
}

function buildBranchChips(){
  const gen2 = MEM.filter(m => m.generation===2 && m.relationType==='Blood');
  const el = document.getElementById('branchChips');
  el.innerHTML = `<div class="chip active" data-branch="" onclick="setBranch(null)">Whole Family <span class="count">${MEM.filter(m=>m.relationType==='Blood').length}</span></div>` +
    gen2.map(m => {
      const desc = countDescendants(m.familyId);
      return `<div class="chip" data-branch="${esc(m.familyId)}" onclick="setBranch('${esc(m.familyId)}')">${esc(m.name)}'s Family <span class="count">${desc}</span></div>`;
    }).join('');
}

function countDescendants(familyId){
  let count = 0;
  const kids = MEM.filter(m => m.parentFamilyId === familyId && m.relationType==='Blood');
  count += kids.length;
  kids.forEach(k => count += countDescendants(k.familyId));
  return count;
}

function setBranch(id){
  activeBranch = id;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.branch === (id||"")));
  renderTree();
}

function childrenOf(familyId){
  return MEM.filter(m => m.parentFamilyId === familyId && m.relationType === 'Blood');
}

function coupleNodeHtml(blood){
  const spouse = blood.spouseMemberId ? byId[blood.spouseMemberId] : null;
  const kids = childrenOf(blood.familyId);
  const genderClass = (p) => (p.gender||'').toLowerCase()==='female' ? 'female' : 'male';
  const deceasedClass = (p) => (p.status||'').toLowerCase()==='deceased' ? 'deceased' : '';
  const personHtml = (p) => `
    <div class="person ${genderClass(p)} ${deceasedClass(p)}" onclick="openDetail('${p.memberId}', event)">
      <div class="p-info">
        <div class="p-name">${esc(p.name)}</div>
        <div class="p-meta">${p.dob ? 'b. '+p.dob.slice(0,4) : ''}${p.status==='Deceased' && p.deathDate ? ' – d. '+p.deathDate.slice(0,4) : ''}</div>
      </div>
    </div>`;
  return `
    <div class="couple-wrap">
      <span class="gen-badge">GEN ${blood.generation}</span>
      <span class="node-row">
        ${kids.length ? `<span class="toggle" onclick="toggleNode(event)">▾</span>` : `<span class="leaf-dot"></span>`}
        <span class="couple">
          ${personHtml(blood)}
          ${spouse ? `<span class="cross" style="align-self:center;padding:0 6px;">✕</span>${personHtml(spouse)}` : ''}
        </span>
      </span>
    </div>`;
}

function toggleNode(ev){
  ev.stopPropagation();
  const li = ev.target.closest('li');
  li.classList.toggle('collapsed');
  ev.target.style.transform = li.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
}

function buildBranch(blood){
  const kids = childrenOf(blood.familyId);
  let html = `<li>${coupleNodeHtml(blood)}`;
  if(kids.length){
    html += `<ul>` + kids.map(k => buildBranch(k)).join('') + `</ul>`;
  }
  html += `</li>`;
  return html;
}

function renderTree(){
  const el = document.getElementById('content');
  let roots;
  if(activeBranch){
    roots = MEM.filter(m => m.familyId === activeBranch && m.relationType==='Blood');
  } else {
    roots = MEM.filter(m => !m.parentFamilyId && m.relationType==='Blood');
  }
  if(!roots.length){
    el.innerHTML = `<div class="empty">No matches.</div>`;
    return;
  }
  el.innerHTML = `<div class="tree"><ul class="tree-root">` + roots.map(r => buildBranch(r)).join('') + `</ul></div>`;
}

function searchFilter(q){
  q = q.trim().toLowerCase();
  if(!q){ renderTree(); return; }
  const matches = MEM.filter(m => (m.name||'').toLowerCase().includes(q));
  const el = document.getElementById('content');
  if(!matches.length){ el.innerHTML = `<div class="empty">No matches.</div>`; return; }
  el.innerHTML = `<div class="tree"><div style="display:flex;flex-direction:column;gap:10px;">` +
    matches.map(m => `
      <div style="cursor:pointer;" onclick="openDetail('${m.memberId}')">
        ${coupleNodeHtml(byId[m.familyId] || m)}
      </div>`).join('') + `</div></div>`;
}

function ageOrYears(dob, endDate, status){
  if(!dob) return '';
  const start = new Date(dob);
  const end = endDate ? new Date(endDate) : new Date();
  let years = end.getFullYear() - start.getFullYear();
  return years;
}

function openDetail(id, ev){
  if(ev) ev.stopPropagation();
  const p = byId[id];
  if(!p) return;
  const spouse = p.spouseMemberId ? byId[p.spouseMemberId] : null;
  const parentCouple = p.parentFamilyId ? byId[p.parentFamilyId] : null;
  const parentSpouse = parentCouple && parentCouple.spouseMemberId ? byId[parentCouple.spouseMemberId] : null;
  const kids = childrenOf(p.relationType==='Blood' ? p.familyId : (byId[p.familyId] ? p.familyId : ''));
  const siblings = parentCouple ? MEM.filter(m => m.parentFamilyId===parentCouple.familyId && m.relationType==='Blood' && m.memberId!==p.memberId) : [];

  const age = p.status==='Deceased' ? ageOrYears(p.dob, p.deathDate) : ageOrYears(p.dob);
  const ageLabel = p.dob ? (p.status==='Deceased' ? `Lived ${age} years` : `Age ${age}`) : '';

  const panel = document.getElementById('panel');
  panel.innerHTML = `
    <div class="panel-head">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-eyebrow">Generation ${p.generation} · ${esc(p.relationType)}</div>
      <div class="panel-title">${esc(p.name)}</div>
      <div class="panel-sub">${esc(p.gender)}${ageLabel ? ' · '+ageLabel : ''}</div>
    </div>
    <div class="panel-body">
      <div class="field"><div class="field-label">Status</div><div class="field-value"><span class="stamp ${(p.status||'').toLowerCase()}">${esc(p.status)}</span></div></div>
      <div class="field"><div class="field-label">Date of Birth</div><div class="field-value">${esc(p.dob) || '—'}</div></div>
      ${spouse ? `<div class="field"><div class="field-label">Spouse</div><div class="field-value"><a onclick="openDetail('${spouse.memberId}')">${esc(spouse.name)}</a></div></div>` : ''}
      ${p.marriageDate ? `<div class="field"><div class="field-label">Marriage Date</div><div class="field-value">${esc(p.marriageDate)}</div></div>` : ''}
      ${p.status==='Deceased' ? `<div class="field"><div class="field-label">Death Date</div><div class="field-value">${esc(p.deathDate) || '—'}</div></div>` : ''}
      ${parentCouple ? `<div class="field"><div class="field-label">Parents</div><div class="field-value"><a onclick="openDetail('${parentCouple.memberId}')">${esc(parentCouple.name)}</a>${parentSpouse ? ` &amp; <a onclick="openDetail('${parentSpouse.memberId}')">${esc(parentSpouse.name)}</a>` : ''}</div></div>` : ''}
      ${siblings.length ? `<div class="field"><div class="field-label">Siblings</div><div class="field-value">${siblings.map(s=>`<a onclick="openDetail('${s.memberId}')">${esc(s.name)}</a>`).join(', ')}</div></div>` : ''}
      ${kids.length ? `<div class="field"><div class="field-label">Children</div><div class="field-value">${kids.map(k=>`<a onclick="openDetail('${k.memberId}')">${esc(k.name)}</a>`).join(', ')}</div></div>` : ''}
      <div class="field"><div class="field-label">Location</div><div class="field-value">${esc(p.location) || '—'}</div></div>
      ${p.notes ? `<div class="field"><div class="field-label">Notes</div><div class="field-value">${esc(p.notes)}</div></div>` : ''}
    </div>`;
  document.getElementById('overlay').classList.add('show');
  panel.classList.add('show');
}

function closePanel(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click', closePanel);
document.getElementById('search').addEventListener('input', e => searchFilter(e.target.value));

document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.tree li.collapsed').forEach(li => {
    li.classList.remove('collapsed');
    const t = li.querySelector('.toggle');
    if(t) t.style.transform = 'rotate(0deg)';
  });
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.tree ul li').forEach(li => {
    if(li.querySelector('ul')){
      li.classList.add('collapsed');
      const t = li.querySelector('.toggle');
      if(t) t.style.transform = 'rotate(-90deg)';
    }
  });
});

load();
</script>
</body>
</html>
