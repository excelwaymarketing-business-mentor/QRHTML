<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asset Portal</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.card{
max-width:900px;
margin:auto;
background:white;
border-radius:10px;
padding:20px;
box-shadow:0px 2px 10px rgba(0,0,0,0.2);
}

.header{
display:flex;
align-items:center;
border-bottom:2px solid #003366;
padding-bottom:15px;
margin-bottom:20px;
}

.logo{
width:90px;
height:auto;
margin-right:20px;
}

.headertext{
flex:1;
}

.headertext h1{
margin:0;
color:#003366;
font-size:28px;
}

.headertext h3{
margin:5px 0;
color:#666;
font-weight:normal;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#003366;
color:white;
}

.status{
font-weight:bold;
font-size:18px;
}

.green{
color:green;
}

.orange{
color:orange;
}

.red{
color:red;
}

.blue{
color:blue;
}

h2{
color:#003366;
}

.footer{
margin-top:20px;
padding-top:10px;
border-top:1px solid #ddd;
text-align:center;
font-size:12px;
color:gray;
}

@media screen and (max-width:600px){

.header{
flex-direction:column;
text-align:center;
}

.logo{
margin-right:0;
margin-bottom:10px;
}

.headertext h1{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="header">

<img src="assets/logo.jpg" class="logo">

<div class="headertext">

<h1>Asset Information</h1>

<h3>Asset Management Portal</h3>

</div>

</div>

<div id="output">

Loading Asset Information...

</div>

<div class="footer">

Powered by Excel Way Asset Management

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const assetid=params.get("id");

fetch("assets.json")

.then(response=>response.json())

.then(data=>{

if(!assetid){

document.getElementById("output").innerHTML="<h2>No Asset ID supplied.</h2>";

return;

}

if(!data[assetid]){

document.getElementById("output").innerHTML="<h2>Asset Not Found</h2>";

return;

}

let a=data[assetid];

let statusclass="green";

if(a.Status=="Repair") statusclass="orange";
if(a.Status=="Disposed") statusclass="red";
if(a.Status=="Reserved") statusclass="blue";

let html="";

html+="<table>";

html+="<tr><td><b>Asset ID</b></td><td>"+assetid+"</td></tr>";

html+="<tr><td><b>Asset Name</b></td><td>"+a.AssetName+"</td></tr>";

html+="<tr><td><b>Category</b></td><td>"+a.Category+"</td></tr>";

html+="<tr><td><b>Location</b></td><td>"+a.Location+"</td></tr>";

html+="<tr><td><b>Owner</b></td><td>"+a.Owner+"</td></tr>";

html+="<tr><td><b>Status</b></td><td class='"+statusclass+" status'>"+a.Status+"</td></tr>";

html+="</table>";

html+="<br>";

html+="<h2>Asset History</h2>";

html+="<table>";

html+="<tr>";

html+="<th>Date</th>";

html+="<th>Action</th>";

html+="<th>By</th>";

html+="<th>Remarks</th>";

html+="</tr>";

if(a.History.length==0){

html+="<tr><td colspan='4'>No History Available</td></tr>";

}else{

a.History.forEach(function(h){

html+="<tr>";

html+="<td>"+h.Date+"</td>";

html+="<td>"+h.Action+"</td>";

html+="<td>"+h.By+"</td>";

html+="<td>"+h.Remarks+"</td>";

html+="</tr>";

});

}

html+="</table>";

document.getElementById("output").innerHTML=html;

})

.catch(function(){

document.getElementById("output").innerHTML="<h2>Unable to load asset data.</h2>";

});

</script>

</body>

</html>
